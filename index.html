<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مطعم الشيف حسين الباشا</title>
  <style>
    :root {
      --primary-red: #d74343;
      --gold: #f0c35a;
      --dark-bg: #0a0a0a;
      --card-bg: #161616;
    }

    * { box-sizing: border-box; transition: all 0.3s ease; }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      color: #fff;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      text-align: center;
      padding: 50px 20px;
      border-bottom: 2px solid var(--gold);
      position: relative;
    }

    .logo-container {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 20px;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid var(--gold);
      box-shadow: 0 0 20px rgba(240, 195, 90, 0.3);
    }

    h1 { 
      margin: 10px 0; 
      font-size: 32px; 
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .tagline {
      color: var(--gold);
      font-style: italic;
      font-size: 18px;
      opacity: 0.9;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      padding: 40px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .item {
      background: var(--card-bg);
      border: 1px solid #222;
      padding: 0;
      border-radius: 25px;
      overflow: hidden;
      position: relative;
    }

    .item:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .item img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .item-info { padding: 20px; text-align: center; }

    /* تنسيق الخيارات الجديدة */
    .options-box {
      background: #111;
      padding: 10px;
      border-radius: 15px;
      margin: 10px 0;
      border: 1px dashed #444;
    }

    .option-select {
      background: #222;
      color: var(--gold);
      border: 1px solid var(--gold);
      border-radius: 10px;
      padding: 5px;
      width: 100%;
      margin-bottom: 5px;
    }

    .ingredients-hint {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 10px;
      display: block;
    }

    .note-input {
      width: 100%;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #ccc;
      font-size: 0.9em;
      margin-top: 5px;
    }

    .price {
      color: var(--gold);
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 15px;
    }

    #cart-section {
      background: #111;
      margin: 40px 20px;
      padding: 30px;
      border-radius: 30px;
      border: 1px solid #333;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .cart-item {
      display: flex;
      flex-direction: column;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      margin-bottom: 10px;
    }

    .cart-item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .cart-item-details {
      font-size: 0.85em;
      color: #aaa;
      margin-top: 5px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      background: #222;
      border-radius: 50px;
      padding: 5px 15px;
    }

    .qty-btn {
      background: none;
      color: var(--gold);
      font-size: 20px;
      width: 30px;
      height: 30px;
      padding: 0;
      border: none;
      cursor: pointer;
    }

    .btn-order {
      background: linear-gradient(90deg, #d74343, #b93232);
      border-radius: 15px;
      padding: 15px;
      font-size: 16px;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    input[type="text"] {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 15px;
      color: white;
      margin: 20px 0;
    }

    #whatsappBtn {
      background: #25D366;
      color: #fff;
      font-size: 18px;
      border-radius: 50px;
      width: 100%;
      padding: 15px;
      border: none;
      cursor: pointer;
    }

    .total-display {
      font-size: 1.5em;
      text-align: center;
      color: var(--gold);
      margin: 20px 0;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <img src="https://69fff2bee3ddafb3f4a018b4.imgix.net/idk/1000017621.jpg?w=447&h=447" alt="لوجو الباشا" class="logo-img">
    </div>
    <h1>مطعم الشيف حسين الباشا</h1>
    <div class="tagline">"إذا مجنت معزب لا تفتح مطعم"</div>
  </header>

  <section class="menu" id="menu"></section>

  <section id="cart-section">
    <div class="cart-header">
      <h2>🛒 طلباتك المختارة</h2>
    </div>
    
    <div id="cartItems">
      <p style="text-align: center; color: #666;">لم تختر أي وجبة بعد..</p>
    </div>
    
    <div class="total-display" id="total">
      المجموع: 0 د.ع
    </div>

    <input type="text" id="address-input" placeholder="🏠 اكتب عنوان التوصيل أو أي ملاحظات عامة للطلب...">
    <button id="whatsappBtn" onclick="sendWhatsApp()">✅ إتمام الطلب عبر واتساب</button>
  </section>

  <script>
    const foods = [
      { 
        id: 1, 
        name: 'بركر لحم كلاسك', 
        img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500' 
      },
      { 
        id: 2, 
        name: 'بركر دجاج كلاسك', 
        img: 'https://images.unsplash.com/photo-1610614819513-58e34989848b?q=80&w=500' 
      }
    ];

    let cart = [];

    function renderMenu() {
      const menuDiv = document.getElementById('menu');
      menuDiv.innerHTML = foods.map(food => `
        <div class="item">
          <img src="${food.img}" alt="${food.name}">
          <div class="item-info">
            <h3>${food.name}</h3>
            
            <div class="options-box">
              <label style="display:block; margin-bottom:5px; font-size:0.9em;">اختر النوع:</label>
              <select id="type-${food.id}" class="option-select" onchange="updatePriceHint(${food.id})">
                <option value="وجبة" data-price="5000">وجبة (مع فنكر وصوصات) - 5,000 د.ع</option>
                <option value="ساندويش" data-price="3500">ساندويش (برغر فقط) - 3,500 د.ع</option>
              </select>
              <input type="text" id="note-${food.id}" class="note-input" placeholder="أضف ملاحظة أو إضافات (اختياري)...">
            </div>

            <button class="btn-order" onclick="prepareAddToCart(${food.id})">إضافة للطلب +</button>
          </div>
        </div>
      `).join('');
    }

    function updatePriceHint(id) {
        // يمكن إضافة تأثير بصري هنا عند تغيير النوع
    }

    function prepareAddToCart(id) {
      const food = foods.find(f => f.id === id);
      const typeSelect = document.getElementById(`type-${id}`);
      const selectedType = typeSelect.value;
      const selectedPrice = parseInt(typeSelect.options[typeSelect.selectedIndex].getAttribute('data-price'));
      const note = document.getElementById(`note-${id}`).value;

      // إنشاء معرف فريد للوجبة بناءً على النوع والملاحظة لعدم دمج ساندويش مع وجبة في السلة
      const cartItemId = `${id}-${selectedType}-${note}`;
      
      const existing = cart.find(item => item.cartId === cartItemId);
      if (existing) {
        existing.quantity++;
      } else {
        cart.push({
          cartId: cartItemId,
          id: id,
          name: food.name,
          type: selectedType,
          price: selectedPrice,
          note: note,
          quantity: 1
        });
      }
      
      // مسح الملاحظة بعد الإضافة
      document.getElementById(`note-${id}`).value = '';
      renderCart();
    }

    function updateQty(cartId, delta) {
      const item = cart.find(i => i.cartId === cartId);
      if (item) {
        item.quantity += delta;
        if (item.quantity <= 0) cart = cart.filter(i => i.cartId !== cartId);
      }
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById('cartItems');
      const totalDiv = document.getElementById('total');
      
      if (cart.length === 0) {
        cartDiv.innerHTML = '<p style="text-align: center; color: #666;">السلة فارغة حالياً</p>';
        totalDiv.innerHTML = 'المجموع: 0 د.ع';
        return;
      }

      let total = 0;
      cartDiv.innerHTML = cart.map(item => {
        total += item.price * item.quantity;
        return `
          <div class="cart-item">
            <div class="cart-item-top">
                <span><strong>${item.name}</strong> (${item.type})</span>
                <div class="qty-controls">
                  <button class="qty-btn" onclick="updateQty('${item.cartId}', -1)">-</button>
                  <span style="margin: 0 10px">${item.quantity}</span>
                  <button class="qty-btn" onclick="updateQty('${item.cartId}', 1)">+</button>
                </div>
                <span style="color: var(--gold)">${(item.price * item.quantity).toLocaleString()} د.ع</span>
            </div>
            <div class="cart-item-details">
                ${item.note ? '📝 ملاحظة: ' + item.note : ''}
            </div>
          </div>
        `;
      }).join('');
      
      totalDiv.innerHTML = `المجموع الكلي: ${total.toLocaleString()} د.ع`;
    }

    function sendWhatsApp() {
      if (cart.length === 0) return alert('أضف وجبة واحدة على الأقل');
      
      const address = document.getElementById('address-input').value;
      let msg = `*طلب جديد من مطعم حسين الباشا*%0A%0A`;
      
      cart.forEach(item => {
        msg += `• *${item.name}* (${item.type})%0A`;
        msg += `  العدد: ${item.quantity} | السعر: ${item.price * item.quantity} د.ع%0A`;
        if(item.note) msg += `  ملاحظة: ${item.note}%0A`;
        msg += `--------------------------%0A`;
      });
      
      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      msg += `%0A💰 *المجموع الكلي:* ${total.toLocaleString()} د.ع`;
      if(address) msg += `%0A📍 *العنوان:* ${address}`;
      
      window.open(`https://wa.me/9647783155340?text=${msg}`);
    }

    renderMenu();
  </script>
</body>
</html>
